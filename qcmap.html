<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        #map { height: 700px; width: 100%; }
        .search-box {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 5px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .legend {
            line-height: 18px;
            color: #555;
            background: white;
            padding: 6px 8px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="search" placeholder="Type Barangay name">
    <button onclick="searchBarangay()">Go</button>
</div>

<div id="map"></div>

<script>
    var map = L.map('map').setView([14.676, 121.043], 12);

    // Tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var cases = {
        "Commonwealth": 80,
        "Kaligayahan": 35,
        "Bagong Silangan": 21
    };

    // Reverse color scale (light → dark)
    function getColor(d) {
        return d > 100 ? '#004e64' :   // darkest
               d > 50  ? '#007c91' :
               d > 20  ? '#00aebd' :
               d > 10  ? '#33cdd5' :
               d > 5   ? '#66dbe8' :
                         '#cceff4';  // lightest
    }

    var geoLayer; // Keep reference to layer for search

    fetch("qc_barangay.geojson")
        .then(res => res.json())
        .then(data => {
            geoLayer = L.geoJSON(data, {
                style: function(feature) {
                    var brgy = feature.properties.NAME || feature.properties.name; 
                    var total = cases[brgy] || 0;
                    return {
                        fillColor: getColor(total),
                        weight: 1,
                        color: 'white',
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function(feature, layer) {
                    var brgy = feature.properties.NAME || feature.properties.name;
                    var total = cases[brgy] || 0;

                    layer.bindPopup("<b>" + brgy + "</b><br>Cases: " + total);

                    layer.on({
                        mouseover: function(e) {
                            var hoveredLayer = e.target;
                            hoveredLayer.setStyle({
                                weight: 3,
                                color: '#666',
                                fillOpacity: 0.9
                            });
                            hoveredLayer.bringToFront();
                            hoveredLayer.openPopup();
                        },
                        mouseout: function(e) {
                            var hoveredLayer = e.target;
                            hoveredLayer.setStyle({
                                weight: 1,
                                color: 'white',
                                fillOpacity: 0.7
                            });
                            hoveredLayer.closePopup();
                        }
                    });
                }
            }).addTo(map);

            // Add legend
            var legend = L.control({position: 'bottomright'});
            legend.onAdd = function(map) {
                var div = L.DomUtil.create('div', 'legend'),
                    grades = [0, 5, 10, 20, 50, 100],
                    labels = [];
                for (var i = 0; i < grades.length; i++) {
                    div.innerHTML +=
                        '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                        grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
                }
                return div;
            };
            legend.addTo(map);
        })
        .catch(err => console.error("Error loading the GeoJSON:", err));

    // Search function
    function searchBarangay() {
        var input = document.getElementById('search').value.trim();
        if (!input || !geoLayer) return;

        geoLayer.eachLayer(function(layer) {
            var brgy = layer.feature.properties.NAME || layer.feature.properties.name;
            if (brgy.toLowerCase() === input.toLowerCase()) {
                map.fitBounds(layer.getBounds());
                layer.openPopup();
            }
        });
    }
</script>

</body>
</html>
