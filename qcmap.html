<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>QC Deliveries Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #filterBar {
            background: white;
            padding: 10px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1000;
        }
        #map { height: calc(100vh - 60px); }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            line-height: 18px;
            color: #555;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
        .special-area-label {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #444;
            text-shadow: 1px 1px 2px white;
            font-size: 11px;
        }
    </style>
</head>

<body>

<div id="filterBar">
    <div>
        Barangay
        <input list="barangays" id="barangaySelect">
        <datalist id="barangays"></datalist>
        <button onclick="zoomToBarangay()">Go</button>
    </div>

    <div>
        District
        <select id="districtSelect" onchange="filterDistrict()">
            <option value="all">All Districts</option>
            <option value="1">District 1</option>
            <option value="2">District 2</option>
            <option value="3">District 3</option>
            <option value="4">District 4</option>
            <option value="5">District 5</option>
            <option value="6">District 6</option>
        </select>
    </div>

    <div>
        Color By
        <select id="ageGroupSelect" onchange="updateColors()">
            <option value="total">Total Deliveries</option>
            <option value="15-19">Age 15-19</option>
            <option value="20-30">Age 20-30</option>
            <option value="30-40">Age 30-40</option>
            <option value="41+">Age 41+</option>
        </select>
    </div>

    <div>
        <input type="checkbox" id="showHospitals" checked onchange="toggleHospitals()">
        Hospitals
    </div>
</div>

<div id="map"></div>

<script>
    var map = L.map('map').setView([14.676, 121.043], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var hospitalIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3063/3063176.png', 
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -32]
    });

    map.createPane('hospitalPane');
    map.getPane('hospitalPane').style.zIndex = 650;

    var geoLayer;
    var cases = {};
    var districtTotals = {}; // Restored
    var hospitalCases = {};
    var hospitalMarkers = [];
    var barangayList = [];
    var currentMax = 0;
    var currentDistrict = "all";
    
    var specialAreas = ["Reservoir", "QMC"];

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() { return L.DomUtil.create('div', 'legend'); };
    legend.addTo(map);

    function getColor(val, name) {
        if (specialAreas.includes(name)) return "#ffffff";
        if (val == 0) return "#ffffff";
        
        var step = currentMax / 5;
        return val > step * 4 ? '#004e64' :
               val > step * 3 ? '#007c91' :
               val > step * 2 ? '#00aebd' :
               val > step * 1 ? '#33cdd5' :
                                '#66dbe8';
    }

    fetch("qc_barangay.geojson")
    .then(r => r.json())
    .then(data => {
        geoLayer = L.geoJSON(data, {
            style: feature => {
                return {
                    fillColor: "#ffffff",
                    weight: specialAreas.includes(feature.properties.NAME) ? 0.5 : 1,
                    color: 'white',
                    fillOpacity: 0.7
                };
            },
            onEachFeature: function(feature, layer) {
                var brgy = feature.properties.NAME;
                
                if (!barangayList.includes(brgy) && !specialAreas.includes(brgy)) {
                    barangayList.push(brgy);
                    var opt = document.createElement('option');
                    opt.value = brgy;
                    document.getElementById('barangays').appendChild(opt);
                }

                if (specialAreas.includes(brgy)) {
                    layer.bindTooltip(brgy, {
                        permanent: true, 
                        direction: 'center', 
                        className: 'special-area-label'
                    }).openTooltip();
                } else {
                    layer.on({
                        mouseover: function(e) {
                            var l = e.target;
                            var district = l.feature.properties.PROP6DISTB;
                            var selectedAge = document.getElementById("ageGroupSelect").value;
                            
                            var displayVal = 0;
                            var labelText = selectedAge === 'total' ? "Total Deliveries" : "Deliveries (Age " + selectedAge + ")";
                            
                            if (cases[brgy]) {
                                displayVal = selectedAge === 'total' ? cases[brgy].total : (cases[brgy].ageGroups[selectedAge] || 0);
                            }

                            l.setStyle({ weight: 3, color: '#000', fillOpacity: 0.9 });
                            l.bringToFront();
                            
                            // UPDATED TOOLTIP LOGIC: Shows district total if a district filter is active
                            var content = currentDistrict === "all" 
                                ? "<b>"+brgy+"</b><br>" + labelText + ": " + displayVal
                                : "<b>District " + district + "</b><br>" + (selectedAge === 'total' ? 'Total' : 'Age ' + selectedAge) + " Deliveries: " + (districtTotals[district] || 0) + "<br><i>" + brgy + ": " + displayVal + "</i>";

                            l.bindTooltip(content, {sticky: true}).openTooltip();
                        },
                        mouseout: function(e) {
                            var l = e.target;
                            var selectedAge = document.getElementById("ageGroupSelect").value;
                            var val = 0;
                            
                            if (cases[brgy]) {
                                val = (selectedAge === 'total') ? cases[brgy].total : (cases[brgy].ageGroups[selectedAge] || 0);
                            }

                            l.setStyle({
                                fillColor: getColor(val, brgy),
                                weight: 1,
                                color: 'white',
                                fillOpacity: 0.7
                            });
                            
                            e.target.closeTooltip();
                        }
                    });
                    layer.bindPopup(brgy);
                }
            }
        }).addTo(map);

        fetchCases();
    });

    function fetchCases() {
        fetch("https://script.google.com/macros/s/AKfycbyfreSdzQn-_Se8AWT8C9cCrDCiCoaXBmcUqrFOguP1aILj-lWJtW69ozt0Ov7pFiz0YA/exec")
        .then(r => r.json())
        .then(data => {
            data.barangay.forEach(row => {
                cases[row.Barangay] = {
                    total: Number(row.Total),
                    ageGroups: {
                        "15-19": Number(row["Age Group 15-19"]),
                        "20-30": Number(row["Age Group 20-30"]),
                        "30-40": Number(row["Age Group 30-40"]),
                        "41+": Number(row["Age Group 41+"])
                    }
                };
            });

            data.hospital.forEach(row => {
                hospitalCases[row.Hospital] = Number(row.Deliveries);
            });

            updateColors();
            addHospitalMarkers();
        });
    }

    // RESTORED: Calculates totals per district based on active age filter
    function calculateDistrictTotals() {
        districtTotals = {};
        var age = document.getElementById("ageGroupSelect").value;
        
        geoLayer.eachLayer(layer => {
            var brgy = layer.feature.properties.NAME;
            var district = layer.feature.properties.PROP6DISTB;
            
            if (!districtTotals[district]) districtTotals[district] = 0;
            
            if (cases[brgy]) {
                var val = (age === 'total') ? cases[brgy].total : (cases[brgy].ageGroups[age] || 0);
                districtTotals[district] += val;
            }
        });
    }

    function updateColors() {
        var age = document.getElementById("ageGroupSelect").value;
        currentMax = 0;
        
        for (var b in cases) {
            var val = (age === 'total') ? cases[b].total : cases[b].ageGroups[age];
            if (val > currentMax) currentMax = val;
        }

        geoLayer.eachLayer(layer => {
            var brgy = layer.feature.properties.NAME;
            var val = 0;
            if (cases[brgy]) {
                val = age === 'total' ? cases[brgy].total : cases[brgy].ageGroups[age];
            }
            layer.setStyle({fillColor: getColor(val, brgy)});
        });

        calculateDistrictTotals(); // Added here to ensure data is ready for hover
        updateLegend();
    }

    function updateLegend() {
        var step = Math.ceil(currentMax / 5);
        if (step < 1) step = 1;
        var grades = [step, step * 2, step * 3, step * 4];
        var div = legend.getContainer();
        var ageLabel = document.getElementById("ageGroupSelect").value;
        var title = ageLabel === 'total' ? "Deliveries" : "Age " + ageLabel;
        
        div.innerHTML = '<strong>' + title + '</strong><br>';
        div.innerHTML += '<i style="background:' + getColor(1) + '"></i>1–' + step + '<br>';
        for (var i = 0; i < grades.length; i++) {
            var from = grades[i];
            var to = grades[i + 1];
            div.innerHTML += '<i style="background:' + getColor(from + 1) + '"></i>' + 
                (from + 1) + (to ? '–' + to : '+') + '<br>';
        }
    }

    function filterDistrict() {
        currentDistrict = document.getElementById("districtSelect").value;
        geoLayer.eachLayer(layer => {
            var district = layer.feature.properties.PROP6DISTB;
            if (currentDistrict === "all") {
                layer.addTo(map);
            } else if (district == currentDistrict) {
                layer.addTo(map);
                layer.setStyle({ weight: 3, color: '#000' });
                layer.bringToFront();
            } else {
                map.removeLayer(layer);
            }
        });
        calculateDistrictTotals(); // Re-sync totals
    }

    function zoomToBarangay() {
        var input = document.getElementById("barangaySelect").value;
        geoLayer.eachLayer(layer => {
            if (layer.feature.properties.NAME === input) {
                map.fitBounds(layer.getBounds());
                layer.openPopup();
            }
        });
    }

    function addHospitalMarkers() {
        var coords = {
            "Quezon City General Hospital": [14.661326, 121.018241],
            "Rosario Maclang Bautista General Hospital": [14.686221, 121.089147],
            "Novaliches District Hospital": [14.700617, 121.034441]
        };

        hospitalMarkers.forEach(m => map.removeLayer(m));
        hospitalMarkers = [];

        for (var h in hospitalCases) {
            if (!coords[h]) continue;
            var marker = L.marker(coords[h], {
                icon: hospitalIcon,
                pane: 'hospitalPane'
            }).addTo(map);
            marker.bindTooltip("<b>" + h + "</b><br>Deliveries: " + hospitalCases[h]);
            hospitalMarkers.push(marker);
        }
    }

    function toggleHospitals() {
        var show = document.getElementById("showHospitals").checked;
        hospitalMarkers.forEach(m => {
            if (show) m.addTo(map);
            else map.removeLayer(m);
        });
    }
</script>

</body>
</html>
