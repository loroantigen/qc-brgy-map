<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>QC Map with Age Groups</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body { margin:0; padding:0; font-family: Arial, sans-serif; }

/* Top filter bar */
#filterBar {
    width: 100%;
    background: white;
    padding: 10px 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 30px;
}

#filterBar label { margin-right:5px; }
#filterBar input, #filterBar select, #filterBar button { padding:4px 6px; }

/* Map fills remaining viewport */
#map { height: calc(100vh - 60px); width: 100%; }

/* Legend styling */
.legend {
    line-height: 18px;
    color: #555;
    background: white;
    padding: 6px 8px;
    border-radius: 5px;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
}
.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.7;
}
</style>
</head>
<body>

<!-- Top Filter Bar -->
<div id="filterBar">
    <div>
        <label for="barangaySelect">Barangay:</label>
        <input list="barangays" id="barangaySelect" placeholder="Type or select barangay">
        <datalist id="barangays"></datalist>
        <button onclick="zoomToBarangay()">Go</button>
    </div>
    <div>
        <label for="ageGroupSelect">Color by:</label>
        <select id="ageGroupSelect" onchange="updateColors()">
            <option value="total">Total</option>
            <option value="0-17">Age Group 0-17</option>
            <option value="18-40">Age Group 18-40</option>
            <option value="41+">Age Group 41+</option>
        </select>
    </div>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([14.676, 121.043], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var geoLayer;
var cases = {}; // Filled from Apps Script
var barangayList = [];

// Legend
var legend = L.control({position: 'bottomright'});
legend.onAdd = function(map) {
    var div = L.DomUtil.create('div', 'legend');
    return div;
};
legend.addTo(map);

// Color function
function getColor(d) {
    return d > 100 ? '#004e64' :
           d > 50  ? '#007c91' :
           d > 20  ? '#00aebd' :
           d > 10  ? '#33cdd5' :
           d > 5   ? '#66dbe8' :
                     '#cceff4';
}

// Load GeoJSON
fetch("qc_barangay.geojson")
    .then(res => res.json())
    .then(data => {
        geoLayer = L.geoJSON(data, {
            style: function(feature) {
                var brgy = feature.properties.NAME || feature.properties.name;
                var val = cases[brgy] ? cases[brgy].total : 0;
                return { fillColor: getColor(val), weight: 1, color: 'white', fillOpacity: 0.7 };
            },
            onEachFeature: function(feature, layer) {
                var brgy = feature.properties.NAME || feature.properties.name;

                // Populate datalist
                if (!barangayList.includes(brgy)) {
                    barangayList.push(brgy);
                    var option = document.createElement('option');
                    option.value = brgy;
                    document.getElementById('barangays').appendChild(option);
                }

                layer.bindPopup("<b>" + brgy + "</b><br>Loading data...");

                layer.on({
                    mouseover: function(e) {
                        var hoveredLayer = e.target;
                        hoveredLayer.setStyle({ weight: 3, color: '#666', fillOpacity: 0.9 });
                        hoveredLayer.bringToFront();
                        hoveredLayer.openPopup();
                    },
                    mouseout: function(e) {
                        var hoveredLayer = e.target;
                        hoveredLayer.setStyle({ weight: 1, color: 'white', fillOpacity: 0.7 });
                        hoveredLayer.closePopup();
                    }
                });
            }
        }).addTo(map);

        // Fetch data from Apps Script
        fetchCases();
    })
    .catch(err => console.error("Error loading GeoJSON:", err));

function fetchCases() {
    fetch("https://script.google.com/macros/s/AKfycby_IjhcT3xv5tOyexv61TstDCfbsq4rs_QmaipEE8nWzBvN_zOdSN_hL7vI5epkv4Xsxg/exec") // replace with your Apps Script URL
    .then(res => res.json())
    .then(data => {
        cases = {};
        data.forEach(row => {
            var brgy = row.Barangay;
            cases[brgy] = {
                total: Number(row.Total),
                ageGroups: {
                    "0-17": Number(row["Age Group 0-17"]),
                    "18-40": Number(row["Age Group 18-40"]),
                    "41+": Number(row["Age Group 41+"])
                }
            };
        });
        updateColors();
    });
}

function updateColors() {
    if (!geoLayer) return;
    var selectedAge = document.getElementById('ageGroupSelect').value;

    geoLayer.eachLayer(function(layer){
        var brgy = layer.feature.properties.NAME || layer.feature.properties.name;
        var val;

        if (cases[brgy]) {
            if (selectedAge === "total") {
                val = cases[brgy].total;
                // Mouse hover shows only total
                layer.bindPopup("<b>" + brgy + "</b><br>Total: " + val);
            } else {
                val = cases[brgy].ageGroups[selectedAge];
                layer.bindPopup("<b>" + brgy + "</b><br>" + selectedAge + ": " + val);
            }
        } else {
            val = 0;
            layer.bindPopup("<b>" + brgy + "</b><br>No data");
        }

        // Update polygon color based on selected number
        layer.setStyle({ fillColor: getColor(val) });
    });

    updateLegend();
}

// Zoom to selected barangay
function zoomToBarangay() {
    var input = document.getElementById('barangaySelect').value.trim();
    if (!input || !geoLayer) return;

    geoLayer.eachLayer(function(layer) {
        var brgy = layer.feature.properties.NAME || layer.feature.properties.name;
        if (brgy.toLowerCase() === input.toLowerCase()) {
            map.fitBounds(layer.getBounds());
            layer.openPopup();
        }
    });
}

// Update legend
function updateLegend() {
    var grades = [0, 5, 10, 20, 50, 100];
    var div = legend.getContainer();
    div.innerHTML = "";
    grades.forEach((g, i) => {
        div.innerHTML += '<i style="background:' + getColor(g + 1) + '"></i> ' +
                         g + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
    });
}
</script>

</body>
</html>
