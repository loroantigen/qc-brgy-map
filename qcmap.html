<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map{
height:700px;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([14.676,121.043],12);

//L.tileLayer(
//'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
//).addTo(map);

var cases = {
 "Commonwealth":80,
 "Kaligayahan":35,
 "Bagong Silangan":21
};

function getColor(d){

return d > 100 ? '#800026' :
       d > 50  ? '#BD0026' :
       d > 20  ? '#E31A1C' :
       d > 10  ? '#FC4E2A' :
       d > 5   ? '#FD8D3C' :
                 '#FED976';

}

fetch("qc_barangay.geojson")
.then(res=>res.json())
.then(data=>{

L.geoJSON(data,{

style:function(feature){

var brgy = feature.properties.NAME;
var total = cases[brgy] || 0;

return{
fillColor:getColor(total),
weight:1,
color:'white',
fillOpacity:0.7
};

},

onEachFeature:function(feature,layer){

var brgy = feature.properties.NAME;
var total = cases[brgy] || 0;

layer.bindPopup(
"<b>"+brgy+"</b><br>Cases: "+total
);

}

}).addTo(map);

});

</script>

</body>

</html>
